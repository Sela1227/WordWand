<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>WordWand 作文魔法屋</title>
<!-- 自訂 favicon（本專案不套 SELA logo，使用專屬可愛標記）。相對路徑：GitHub Pages 子路徑安全（坑 #39） -->
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="manifest" href="site.webmanifest" />
<meta name="theme-color" content="#54B9EC" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; }
  #root { min-height: 100vh; }
  /* 手機:消除點擊 300ms 延遲與灰色高亮、防止文字被選取 */
  button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  button:active { filter: brightness(0.95); }
  textarea { -webkit-tap-highlight-color: transparent; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @keyframes twinkle { 0%,100%{opacity:0.2;transform:scale(0.7)} 50%{opacity:1;transform:scale(1.1)} }
  @keyframes dotjump { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-10px)} }
  @keyframes rise { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

const VERSION = "V0.7.0";

/* ====================================================================== */
/*  ★★★ 唯一需要你修改的地方:把下面換成你的 Railway 後端網址 ★★★         */
/*  例如:"https://chengyu-magic.up.railway.app"                          */
/*  (後端檔案在 repo 根目錄,Railway 免設 Root Directory)                 */
/* ====================================================================== */
const BACKEND_URL = "https://wordwand-production-2a37.up.railway.app";

/* 精靈「外觀」設定（人格 prompt 放在後端,前端只負責顯示） */
const SPIRITS = {
  nini: { name:"尼尼", tag:"溫柔引導", color:"#FF8FB3", soft:"#FFE4EE", deep:"#C84B77",
    intro:"尼尼會溫柔地聽你說話。寫錯也沒有關係,我們一起慢慢找出好玩、漂亮的句子!" },
  kiki: { name:"奇奇", tag:"博學小老師", color:"#54B9EC", soft:"#DCF1FC", deep:"#1E7BB0",
    intro:"奇奇知道很多成語的小故事!把句子交給我,我會告訴你每個成語從哪裡來。" },
  max:  { name:"麥克斯", tag:"活力滿點", color:"#8AA0F2", soft:"#E7ECFF", deep:"#4756B5",
    intro:"麥克斯超有活力!我們一起把無聊的句子,變成超酷的成語魔法吧!" },
};
const MODES = {
  ideas: { key:"ideas", title:"靈感泡泡", btn:"給我點子!", inputLabel:"輸入一個主題詞:",
    blurb:"不知道要寫什麼嗎?給小精靈一個主題,它會吹出好多靈感泡泡,從不同角度幫你打開思路!",
    placeholder:"我的學校",
    itemLabels:{meaning:"想想看"},
    resultHint:"這些靈感泡泡,挑你喜歡的寫進去:",
    examples:["下雨天","我的好朋友","我最喜歡的食物"] },
  outline:{ key:"outline", title:"作文藏寶圖", btn:"畫藏寶圖!", inputLabel:"輸入你的作文題目:",
    blurb:"拿到題目不知道怎麼開始嗎?把題目給小精靈,它會幫你畫一張藏寶圖,告訴你開頭、經過、結尾各寫什麼!",
    placeholder:"快樂的一天",
    itemLabels:{meaning:"可以寫什麼"},
    resultHint:"照著這張藏寶圖,一段一段自己寫:",
    examples:["我最難忘的一天","我的家人","一次失敗的經驗"] },
  gym:   { key:"gym", title:"句子健身房", btn:"幫我看看!", inputLabel:"輸入你想練習的句子:",
    blurb:"把你寫的句子放進來,小精靈像教練一樣,告訴你哪裡可以練得更強壯、還有怎麼改,讓你自己越寫越棒!",
    placeholder:"天氣很好,我們出去玩。",
    itemLabels:{meaning:"說明",why:"怎麼改"},
    resultHint:"教練幫你看看可以更強的地方:",
    examples:["我今天去公園玩,很開心。","那隻狗很大很大。","我吃了飯然後去睡覺。"] },
  grow:  { key:"grow", title:"魔法長大樹", btn:"讓它長大!", inputLabel:"輸入一句話,讓它長大:",
    blurb:"只寫了一句話,不知道怎麼變多嗎?把句子放進來,小精靈會問你幾個問題,跟著想一想,一句話就會長成一段!",
    placeholder:"我吃了一個冰淇淋。",
    resultHint:"跟著這幾個問題想一想,再自己寫寫看:",
    examples:["今天我去了動物園。","昨天下雨了。","我有一個好朋友。"] },
  idiom: { key:"idiom", title:"成語變身術", btn:"變身!", inputLabel:"輸入你想練習的句子:",
    blurb:"你常常寫「很生氣」、「哭得很慘」、「天氣很漂亮」嗎?把句子放進來,小精靈會幫你找出好用的成語!",
    placeholder:"他跑得很快很快。",
    itemLabels:{meaning:"意思",why:"為什麼適合"},
    examples:["我今天考了一百分,心裡非常高興。","弟弟把房間弄得很亂。","今天的夕陽真的好漂亮。"] },
  senses:{ key:"senses", title:"五感放大鏡", btn:"變身!", inputLabel:"輸入你想練習的句子:",
    blurb:"好的描寫會用到眼睛、耳朵、鼻子、嘴巴和皮膚。把句子放進來,小精靈會幫你加上生動的感官描寫!",
    placeholder:"我打開了窗戶。",
    itemLabels:{meaning:"描寫",why:"好處"},
    examples:["我走進了廚房。","外面開始下雨了。","媽媽煮了一鍋湯。"] },
};

function Mascot({ type, color, size=72, animate=true }) {
  const eye = "#3A2E3F";
  return (
    <svg width={size} height={size} viewBox="0 0 100 100"
      style={{ animation: animate ? "bob 2.6s ease-in-out infinite" : "none" }}>
      <ellipse cx="38" cy="92" rx="9" ry="6" fill={color} opacity="0.85" />
      <ellipse cx="62" cy="92" rx="9" ry="6" fill={color} opacity="0.85" />
      <path d="M50 12 C74 12 86 30 86 52 C86 76 70 90 50 90 C30 90 14 76 14 52 C14 30 26 12 50 12 Z" fill={color} />
      <ellipse cx="50" cy="58" rx="24" ry="22" fill="#FFFFFF" opacity="0.4" />
      <circle cx="30" cy="58" r="6" fill="#FF6F91" opacity="0.5" />
      <circle cx="70" cy="58" r="6" fill="#FF6F91" opacity="0.5" />
      {type==="nini" && (<>
        <path d="M34 46 q5 6 10 0" stroke={eye} strokeWidth="3.5" fill="none" strokeLinecap="round" />
        <path d="M56 46 q5 6 10 0" stroke={eye} strokeWidth="3.5" fill="none" strokeLinecap="round" />
        <path d="M44 56 q6 5 12 0" stroke={eye} strokeWidth="3" fill="none" strokeLinecap="round" />
        <path d="M40 16 l8 6 -8 6 z" fill="#FFFFFF" opacity="0.9" />
        <path d="M60 16 l-8 6 8 6 z" fill="#FFFFFF" opacity="0.9" />
        <circle cx="50" cy="22" r="3" fill="#FFFFFF" />
      </>)}
      {type==="kiki" && (<>
        <circle cx="38" cy="48" r="3.5" fill={eye} />
        <circle cx="62" cy="48" r="3.5" fill={eye} />
        <circle cx="38" cy="48" r="10" fill="none" stroke={eye} strokeWidth="2.5" />
        <circle cx="62" cy="48" r="10" fill="none" stroke={eye} strokeWidth="2.5" />
        <line x1="48" y1="48" x2="52" y2="48" stroke={eye} strokeWidth="2.5" />
        <path d="M44 58 q6 4 12 0" stroke={eye} strokeWidth="3" fill="none" strokeLinecap="round" />
      </>)}
      {type==="max" && (<>
        <circle cx="38" cy="48" r="6" fill={eye} />
        <circle cx="62" cy="48" r="6" fill={eye} />
        <circle cx="40" cy="46" r="2" fill="#FFFFFF" />
        <circle cx="64" cy="46" r="2" fill="#FFFFFF" />
        <path d="M42 58 q8 8 16 0" stroke={eye} strokeWidth="3.5" fill="none" strokeLinecap="round" />
        <path d="M50 6 l-7 14 h6 l-4 12 12 -16 h-6 l5 -10 z" fill="#FFFFFF" />
      </>)}
    </svg>
  );
}
function Sparkle({ top, left, size=16, delay=0 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24"
      style={{ position:"absolute", top, left, animation:`twinkle 2.4s ease-in-out ${delay}s infinite`, pointerEvents:"none" }}>
      <path d="M12 0 C13 7 17 11 24 12 C17 13 13 17 12 24 C11 17 7 13 0 12 C7 11 11 7 12 0 Z" fill="#FFFFFF" opacity="0.9" />
    </svg>
  );
}
function MicIcon({ color }) {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="9" y="2" width="6" height="11" rx="3" />
      <path d="M5 11 a7 7 0 0 0 14 0" />
      <line x1="12" y1="18" x2="12" y2="22" />
    </svg>
  );
}
function CamIcon({ color }) {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 7 h3 l1.5 -2 h7 L23 7" />
      <rect x="3" y="7" width="18" height="13" rx="3" />
      <circle cx="12" cy="13.5" r="3.5" />
    </svg>
  );
}
function CopyIcon({ color }) {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="9" y="9" width="11" height="11" rx="2.5" />
      <path d="M5 15 H4.5 A1.5 1.5 0 0 1 3 13.5 V4.5 A1.5 1.5 0 0 1 4.5 3 h9 A1.5 1.5 0 0 1 15 4.5 V5" />
    </svg>
  );
}
function SpeakIcon({ color }) {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M4 9 v6 h4 l5 4 V5 l-5 4 z" />
      <path d="M17 8 a5 5 0 0 1 0 8" />
    </svg>
  );
}

function App() {
  const [spiritKey, setSpiritKey] = useState("nini");
  const [mode, setMode] = useState("ideas");
  const [text, setText] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [inputMsg, setInputMsg] = useState("");
  const [listening, setListening] = useState(false);
  const [photoLoading, setPhotoLoading] = useState(false);
  const [copyMsg, setCopyMsg] = useState("");
  const [speaking, setSpeaking] = useState(false);
  const recognitionRef = useRef(null);
  const fileInputRef = useRef(null);
  const spirit = SPIRITS[spiritKey];
  const cfg = MODES[mode];

  function stopSpeak() { if (typeof window !== "undefined" && window.speechSynthesis) window.speechSynthesis.cancel(); setSpeaking(false); }

  function buildExportText(r) {
    const lines = [];
    if (r.upgraded) lines.push(r.upgraded);
    if (Array.isArray(r.items)) r.items.forEach((it) => {
      let line = "・" + it.word + "：" + it.meaning;
      if (it.why) line += "（" + ((cfg.itemLabels && cfg.itemLabels.why) || "提示") + "：" + it.why + "）";
      lines.push(line);
    });
    if (Array.isArray(r.questions)) r.questions.forEach((q, i) => lines.push((i + 1) + ". " + q));
    return lines.join("\n");
  }

  function buildSpeechText(r) {
    const parts = [];
    if (r.upgraded) parts.push(r.upgraded);
    if (Array.isArray(r.items)) r.items.forEach((it) => parts.push(it.word + "。" + it.meaning + (it.why ? "。" + it.why : "")));
    if (Array.isArray(r.questions)) r.questions.forEach((q) => parts.push(q));
    return parts.join("。");
  }

  async function copyResult() {
    if (!result) return;
    const txt = buildExportText(result);
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(txt);
      } else {
        const ta = document.createElement("textarea");
        ta.value = txt; ta.style.position = "fixed"; ta.style.opacity = "0";
        document.body.appendChild(ta); ta.select(); document.execCommand("copy");
        document.body.removeChild(ta);
      }
      setCopyMsg("已複製!貼到哪裡都可以給老師看");
    } catch(_) { setCopyMsg("複製失敗,手動選取一下也可以喔!"); }
    setTimeout(() => setCopyMsg(""), 2500);
  }

  function toggleSpeak() {
    if (typeof window === "undefined" || !window.speechSynthesis || !result) return;
    if (speaking) { stopSpeak(); return; }
    const u = new SpeechSynthesisUtterance(buildSpeechText(result));
    u.lang = "zh-TW"; u.rate = 0.95;
    u.onend = () => setSpeaking(false);
    u.onerror = () => setSpeaking(false);
    window.speechSynthesis.cancel();
    setSpeaking(true);
    window.speechSynthesis.speak(u);
  }

  const SR = (typeof window !== "undefined") && (window.SpeechRecognition || window.webkitSpeechRecognition);
  const voiceSupported = !!SR;

  function toggleVoice() {
    if (!voiceSupported) return;
    if (listening) { try { recognitionRef.current && recognitionRef.current.stop(); } catch(_){} return; }
    const rec = new SR();
    rec.lang = "zh-TW"; rec.interimResults = true; rec.continuous = false; rec.maxAlternatives = 1;
    const startText = text || "";
    rec.onstart = () => { setListening(true); setInputMsg("聆聽中…說說看你的句子"); };
    rec.onresult = (e) => {
      let s = "";
      for (let i = 0; i < e.results.length; i++) s += e.results[i][0].transcript;
      setText(startText + s);
    };
    rec.onerror = (e) => {
      setListening(false);
      setInputMsg(e.error === "not-allowed" || e.error === "service-not-allowed"
        ? "要先允許使用麥克風喔!" : "沒聽清楚,再說一次或直接打字吧!");
    };
    rec.onend = () => { setListening(false); setInputMsg((m)=> m === "聆聽中…說說看你的句子" ? "" : m); };
    recognitionRef.current = rec;
    try { rec.start(); } catch(_) { setListening(false); }
  }

  function pickPhoto() { fileInputRef.current && fileInputRef.current.click(); }

  function fileToBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(String(r.result).split(",")[1]);
      r.onerror = () => rej(new Error("read"));
      r.readAsDataURL(file);
    });
  }

  async function onPhoto(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    if (file.size > 6 * 1024 * 1024) { setInputMsg("照片太大了,換一張小一點的吧!"); return; }
    if (BACKEND_URL.includes("YOUR-APP")) { setError("還沒設定後端網址喔!"); return; }
    setPhotoLoading(true); setInputMsg("讀照片中…");
    try {
      const b64 = await fileToBase64(file);
      const res = await fetch(`${BACKEND_URL}/read-image`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ image_base64: b64, media_type: file.type || "image/jpeg" }),
      });
      if (!res.ok) throw new Error("bad");
      const data = await res.json();
      if (data.text && data.text.trim()) {
        setText(data.text.trim());
        setInputMsg("讀好了!看看對不對,可以改一改再送出。");
      } else {
        setInputMsg("看不太清楚,拍清楚一點再試,或直接打字吧!");
      }
    } catch(_) {
      setInputMsg("照片讀取失敗,再試一次或直接打字吧!");
    } finally { setPhotoLoading(false); }
  }

  async function castMagic() {
    const input = text.trim();
    if (!input || loading) return;
    if (BACKEND_URL.includes("YOUR-APP")) {
      setError("還沒設定後端網址喔!請打開 docs/index.html,把 BACKEND_URL 換成你的 Railway 網址。");
      return;
    }
    setLoading(true); setResult(null); setError(""); stopSpeak(); setCopyMsg("");
    try {
      const res = await fetch(`${BACKEND_URL}/magic`, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ spirit: spiritKey, mode, text: input }),
      });
      if (!res.ok) throw new Error("bad");
      const data = await res.json();
      setResult(data);
    } catch (e) {
      setError("小精靈的魔法棒打了一個盹,再按一次「變身」試試看吧!");
    } finally { setLoading(false); }
  }

  return (
    <div style={S.root}>
      <div style={{...S.shell}}>
        <div style={S.tabs}>
          {Object.values(MODES).map((m) => {
            const on = m.key === mode;
            return <button key={m.key} onClick={()=>{setMode(m.key);setResult(null);setError("");stopSpeak();setCopyMsg("");}}
              style={{...S.tab, background:on?"#fff":"transparent", color:on?spirit.deep:"#9A8FA0",
                boxShadow:on?"0 6px 16px rgba(0,0,0,0.08)":"none"}}>{m.title}</button>;
          })}
        </div>

        <div style={{...S.heroCard, background:spirit.soft}}>
          <Sparkle top={14} left={"18%"} size={14} delay={0} />
          <Sparkle top={30} left={"82%"} size={18} delay={0.7} />
          <Sparkle top={86} left={"8%"} size={12} delay={1.3} />
          <div style={S.heroRow}>
            <Mascot type={spiritKey} color={spirit.color} size={86} />
            <div style={{flex:1, minWidth:0}}>
              <div style={{...S.pill, background:spirit.color}}>你的專屬語文小教練</div>
              <div style={{...S.heroName, color:spirit.deep}}>現在陪著你的是:{spirit.tag}的【{spirit.name}】</div>
            </div>
          </div>
          <div style={{...S.heroQuote, color:spirit.deep}}>「{spirit.intro}」</div>
        </div>

        <div style={S.switchRow}>
          <span style={S.switchLabel}>切換精靈</span>
          {Object.entries(SPIRITS).map(([k,s]) => {
            const on = k === spiritKey;
            return <button key={k} onClick={()=>setSpiritKey(k)}
              style={{...S.spiritChip, borderColor:on?s.color:"#EADFE6", background:on?s.soft:"#fff",
                color:on?s.deep:"#9A8FA0", transform:on?"translateY(-2px)":"none"}}>
              <Mascot type={k} color={s.color} size={26} animate={false} />{s.name}
            </button>;
          })}
        </div>

        <div style={S.blurbCard}>
          <div style={{...S.blurbTitle, color:spirit.deep}}>{cfg.title}</div>
          <div style={S.blurbText}>{cfg.blurb}</div>
        </div>

        <div style={S.inputLabel}>{cfg.inputLabel || "輸入你想練習的句子:"}</div>
        <textarea value={text} onChange={(e)=>setText(e.target.value)} placeholder={cfg.placeholder}
          rows={3} style={S.textarea} />

        <div style={S.toolRow}>
          {voiceSupported && (
            <button onClick={toggleVoice}
              style={{...S.toolBtn, borderColor:spirit.color,
                background:listening?spirit.color:"#fff", color:listening?"#fff":spirit.deep,
                animation:listening?"pulse 1.2s ease-in-out infinite":"none"}}>
              <MicIcon color={listening?"#fff":spirit.deep} />{listening?"停止":"用說的"}
            </button>
          )}
          <button onClick={pickPhoto} disabled={photoLoading}
            style={{...S.toolBtn, borderColor:spirit.color, background:"#fff", color:spirit.deep,
              opacity:photoLoading?0.6:1}}>
            <CamIcon color={spirit.deep} />{photoLoading?"讀照片中…":"拍照輸入"}
          </button>
          <input type="file" accept="image/*" capture="environment" ref={fileInputRef}
            onChange={onPhoto} style={{display:"none"}} />
        </div>
        {inputMsg && <div style={{...S.inputMsg, color:spirit.deep}}>{inputMsg}</div>}

        <div style={S.exampleRow}>
          {cfg.examples.map((ex,i)=>(
            <button key={i} style={S.exChip} onClick={()=>setText(ex)}>
              {ex.length>12 ? ex.slice(0,12)+"…" : ex}</button>
          ))}
        </div>

        <button onClick={castMagic} disabled={loading||!text.trim()}
          style={{...S.castBtn, background:spirit.color, opacity:(loading||!text.trim())?0.55:1,
            cursor:(loading||!text.trim())?"default":"pointer"}}>
          {loading ? "施展魔法中…" : (cfg.btn || "變身!")}
        </button>

        {loading && (
          <div style={S.loadingBox}>
            <Mascot type={spiritKey} color={spirit.color} size={56} />
            <div style={S.dots}>
              <span style={{...S.dot, background:spirit.color}} />
              <span style={{...S.dot, background:spirit.color, animationDelay:"0.2s"}} />
              <span style={{...S.dot, background:spirit.color, animationDelay:"0.4s"}} />
            </div>
          </div>
        )}

        {error && <div style={S.errorBox}>{error}</div>}

        {result && !loading && result.ok === false && (
          <div style={S.resultWrap}>
            <div style={{...S.cheerCard, background:spirit.soft, color:spirit.deep, marginTop:0}}>
              <Mascot type={spiritKey} color={spirit.color} size={44} animate={false} />
              <span>{result.redirect || "我們在作文魔法屋只幫你做寫作練習喔!請給我一句你想練習的句子吧!"}</span>
            </div>
          </div>
        )}

        {result && !loading && result.ok !== false && (
          <div style={S.resultWrap}>
            {result.upgraded && (
              <div style={{...S.resultTop, borderColor:spirit.color}}>
                <div style={{...S.resultTag, color:spirit.deep}}>變身完成</div>
                <div style={S.upgraded}>{result.upgraded}</div>
              </div>
            )}
            {!result.upgraded && cfg.resultHint && (
              <div style={{...S.hintLine, color:spirit.deep}}>{cfg.resultHint}</div>
            )}
            {Array.isArray(result.items) && result.items.map((it,i)=>(
              <div key={i} style={{...S.idiomCard, animationDelay:`${i*0.08}s`}}>
                <div style={{...S.idiomWord, background:spirit.soft, color:spirit.deep}}>{it.word}</div>
                <div style={S.idiomBody}>
                  <div><b style={{color:spirit.deep}}>{(cfg.itemLabels&&cfg.itemLabels.meaning)||"說明"}:</b>{it.meaning}</div>
                  {it.why && <div style={{marginTop:4}}><b style={{color:spirit.deep}}>{(cfg.itemLabels&&cfg.itemLabels.why)||"提示"}:</b>{it.why}</div>}
                </div>
              </div>
            ))}
            {Array.isArray(result.questions) && result.questions.map((q,i)=>(
              <div key={i} style={{...S.qCard, animationDelay:`${i*0.08}s`}}>
                <div style={{...S.qNum, background:spirit.soft, color:spirit.deep}}>{i+1}</div>
                <div style={S.qText}>{q}</div>
              </div>
            ))}
            {result.cheer && (
              <div style={{...S.cheerCard, background:spirit.soft, color:spirit.deep}}>
                <Mascot type={spiritKey} color={spirit.color} size={44} animate={false} />
                <span>{result.cheer}</span>
              </div>
            )}
            <div style={S.resultActions}>
              <button onClick={copyResult}
                style={{...S.toolBtn, borderColor:spirit.color, background:"#fff", color:spirit.deep}}>
                <CopyIcon color={spirit.deep} />複製給老師看
              </button>
              {(typeof window!=="undefined" && window.speechSynthesis) && (
                <button onClick={toggleSpeak}
                  style={{...S.toolBtn, borderColor:spirit.color,
                    background:speaking?spirit.color:"#fff", color:speaking?"#fff":spirit.deep,
                    animation:speaking?"pulse 1.2s ease-in-out infinite":"none"}}>
                  <SpeakIcon color={speaking?"#fff":spirit.deep} />{speaking?"停止":"念給你聽"}
                </button>
              )}
            </div>
            {copyMsg && <div style={{...S.inputMsg, color:spirit.deep}}>{copyMsg}</div>}
          </div>
        )}

        <div style={S.foot}>WordWand　·　作文魔法屋　·　{VERSION}</div>
      </div>
    </div>
  );
}

/* 跨平台中文字型 fallback chain（kit 靜態頁示範 5.4） */
